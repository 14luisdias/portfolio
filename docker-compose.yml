services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-luis-dias:latest
    container_name: portfolio-luis-dias
    ports:
      - '3000:3000'
    # Injeta todas as variáveis do .env no container
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Dentro do container, o Postgres da máquina host é alcançado via host.docker.internal.
      # DATABASE_URL_DOCKER é lido do .env (interpolação do Compose) e sobrescreve o DATABASE_URL.
      - DATABASE_URL=${DATABASE_URL_DOCKER}
    # Permite que o container alcance o Postgres rodando na máquina host (Linux).
    # O banco é externo (NÃO subimos um serviço de Postgres aqui).
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
